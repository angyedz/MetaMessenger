<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Messenger</title>
  <link rel="stylesheet" href="./styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <button class="theme-toggle-btn" id="theme-toggle" title="Переключить тему">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="auth-screen">
      <div class="auth-container glass">
        <div class="auth-logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="20" fill="url(#gradient)"/>
            <path d="M20 8C13.373 8 8 13.373 8 20C8 26.627 13.373 32 20 32C26.627 32 32 26.627 32 20C32 13.373 26.627 8 20 8ZM20 28C15.582 28 12 24.418 12 20C12 15.582 15.582 12 20 12C24.418 12 28 15.582 28 20C28 24.418 24.418 28 20 28Z" fill="white"/>
            <circle cx="20" cy="20" r="4" fill="white"/>
            <defs>
              <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <h1>Meta Messenger</h1>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Вход</button>
          <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Введите username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" placeholder="Введите пароль" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary">Войти</button>
          <div id="login-error" class="error-message hidden"></div>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" placeholder="Придумайте username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="register-display-name">Отображаемое имя</label>
            <input type="text" id="register-display-name" placeholder="Как вас называть" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="register-password">Пароль</label>
            <input type="password" id="register-password" placeholder="Придумайте пароль" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
          <div id="register-error" class="error-message hidden"></div>
        </form>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="main-screen hidden">
      <!-- Sidebar -->
      <aside class="sidebar glass">
        <div class="sidebar-header">
          <div class="current-user">
            <img id="current-user-avatar" src="" alt="Avatar" class="avatar">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span id="current-user-name"></span>
              <span id="admin-badge" class="admin-badge hidden">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
                Admin
              </span>
            </div>
          </div>
          <div style="display: flex; gap: 8px;">
            <button id="admin-panel-btn" class="btn-icon hidden" title="Админ панель">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <button id="logout-btn" class="btn-icon" title="Выйти">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="search-container">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="user-search" placeholder="Поиск пользователей..." autocomplete="off">
          </div>
        </div>

        <div id="search-results" class="search-results hidden"></div>

        <div class="chats-list">
          <h3>Чаты</h3>
          <div id="chats-container"></div>
        </div>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area glass">
        <div id="no-chat-selected" class="no-chat-selected">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Выберите чат для начала общения</p>
        </div>

        <div id="chat-container" class="chat-container hidden">
          <div class="chat-header">
            <img id="chat-user-avatar" src="" alt="Avatar" class="avatar avatar-large">
            <div class="chat-user-info">
              <h2 id="chat-user-name"></h2>
              <span id="chat-user-status">online</span>
            </div>
          </div>

          <div id="messages-container" class="messages-container"></div>

          <form id="message-form" class="message-form">
            <input type="text" id="message-input" placeholder="Напишите сообщение..." autocomplete="off" maxlength="2000">
            <span id="message-counter" class="message-counter">0/2000</span>
            <button type="submit" class="btn-send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </form>
        </div>
      </main>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="admin-panel glass hidden">
      <div class="admin-panel-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Админ панель
        </h2>
        <button class="admin-panel-close" id="admin-panel-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="admin-panel-content">
        <!-- Ban User -->
        <div class="admin-section">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Забанить пользователя
          </h3>
          <div class="admin-form-group">
            <label for="ban-user-id">User ID</label>
            <input type="text" id="ban-user-id" placeholder="mm64...">
          </div>
          <div class="admin-form-group">
            <label for="ban-username">Username</label>
            <input type="text" id="ban-username" placeholder="username">
          </div>
          <div class="admin-form-group">
            <label for="ban-reason">Причина</label>
            <textarea id="ban-reason" placeholder="Причина бана..."></textarea>
          </div>
          <div class="admin-form-group">
            <label for="ban-duration">Длительность (секунды, 0 = навсегда)</label>
            <input type="number" id="ban-duration" placeholder="604800 (7 дней)" value="604800">
          </div>
          <button class="btn-admin danger" id="ban-user-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Забанить пользователя
          </button>
        </div>

        <!-- Ban IP -->
        <div class="admin-section">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Забанить IP
          </h3>
          <div class="admin-form-group">
            <label for="ban-ip-address">IP адрес</label>
            <input type="text" id="ban-ip-address" placeholder="192.168.1.1">
          </div>
          <div class="admin-form-group">
            <label for="ban-ip-reason">Причина</label>
            <textarea id="ban-ip-reason" placeholder="Причина бана IP..."></textarea>
          </div>
          <div class="admin-form-group">
            <label for="ban-ip-duration">Длительность (секунды, 0 = навсегда)</label>
            <input type="number" id="ban-ip-duration" placeholder="86400 (1 день)" value="86400">
          </div>
          <button class="btn-admin danger" id="ban-ip-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Забанить IP
          </button>
        </div>

        <!-- IP Logs Lookup -->
        <div class="admin-section">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Поиск по IP логам
          </h3>
          <div class="admin-form-group">
            <label for="ip-lookup-username">Username для поиска IP</label>
            <input type="text" id="ip-lookup-username" placeholder="username">
            <button class="btn-admin" id="ip-lookup-btn" style="margin-top: 10px;">
              Найти IP
            </button>
          </div>
          <div id="ip-lookup-result" class="admin-list hidden" style="margin-top: 15px;"></div>
        </div>

        <!-- Banned List -->
        <div class="admin-section">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            Забаненные IP
          </h3>
          <button class="btn-admin" id="refresh-banned-btn" style="margin-bottom: 15px;">
            Обновить список
          </button>
          <div id="banned-list" class="admin-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
